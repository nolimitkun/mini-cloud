<svg width="680" viewBox="0 0 680 352" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>Per-cloud landing zone as a nested hub-and-spoke</title>
<desc>Inside each cloud a landing zone contains a central cloud hub for connectivity, firewall, DNS and shared private endpoints; the on-prem private circuit enters the hub; prod, non-prod and shared workload spokes attach to the hub.</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="42" y="128" font-size="12" fill="#5F5E5A">On-prem hub</text>
<text x="42" y="144" font-size="12" fill="#5F5E5A">(private circuit)</text>
<line x1="42" y1="158" x2="156" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="120" y="30" width="520" height="300" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="144" y="56" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Cloud landing zone</text>
<text x="144" y="74" dominant-baseline="central" font-size="12" fill="#5F5E5A">AWS / Azure / GCP · guardrails enforced</text>

<g>
<rect x="160" y="92" width="440" height="92" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
<text x="380" y="118" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Cloud hub — connectivity (Tier-2 hub)</text>
<text x="380" y="142" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Circuit gateway · firewall · DNS resolver</text>
<text x="380" y="164" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Shared private endpoints</text>
</g>

<line x1="215" y1="232" x2="215" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="380" y1="232" x2="380" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="545" y1="232" x2="545" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g>
<rect x="140" y="232" width="150" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="215" y="258" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Prod spoke</text>
<text x="215" y="280" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">App VPC / VNet</text>
</g>
<g>
<rect x="305" y="232" width="150" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="380" y="258" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Non-prod spoke</text>
<text x="380" y="280" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">App VPC / VNet</text>
</g>
<g>
<rect x="470" y="232" width="150" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="545" y="258" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Shared spoke</text>
<text x="545" y="280" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Platform services</text>
</g>
</svg>
