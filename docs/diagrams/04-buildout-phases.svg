<svg width="680" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>Buildout runbook phase flow and dependencies</title>
<desc>Phase 0 foundations and guardrails gate everything; Phase 1 order circuits and Phase 3 cloud hubs run in parallel; Phase 2 colo edge and Phase 3 both feed Phase 4 BGP; then Phase 5 spokes, Phase 6 DNS and Phase 7 verification.</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g>
<rect x="190" y="20" width="300" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Phase 0 — Foundations + guardrails</text>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Gate: public IP creation denied</text>
</g>
<line x1="340" y1="76" x2="340" y2="104" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g>
<rect x="55" y="106" width="245" height="58" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
<text x="177" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Phase 1 — Order circuits</text>
<text x="177" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">2–6 wk lead · DX / ER / Interconnect</text>
</g>
<g>
<rect x="380" y="106" width="245" height="58" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
<text x="502" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Phase 3 — Cloud hubs</text>
<text x="502" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">terraform apply (parallel)</text>
</g>
<text x="340" y="135" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">in parallel</text>

<line x1="177" y1="164" x2="177" y2="192" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g>
<rect x="55" y="194" width="245" height="58" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
<text x="177" y="216" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Phase 2 — Colo edge</text>
<text x="177" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Routers · cross-connects · MACsec</text>
</g>

<path d="M177 252 L177 280 L320 280" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M502 164 L502 280 L360 280" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g>
<rect x="190" y="282" width="300" height="58" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="340" y="304" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Phase 4 — Bring up BGP</text>
<text x="340" y="324" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Gate: on-prem↔cloud up · no cross-leak</text>
</g>
<line x1="340" y1="340" x2="340" y2="362" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g>
<rect x="190" y="364" width="300" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="340" y="386" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Phase 5 — Spokes → hub firewall</text>
</g>

<line x1="340" y1="408" x2="340" y2="430" stroke="#888780" stroke-width="1.5"/>
<line x1="170" y1="430" x2="510" y2="430" stroke="#888780" stroke-width="1.5"/>
<line x1="170" y1="430" x2="170" y2="444" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="510" y1="430" x2="510" y2="444" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g>
<rect x="70" y="446" width="200" height="22" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
<text x="170" y="458" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Phase 6 — DNS + endpoints</text>
</g>
<g>
<rect x="410" y="446" width="200" height="22" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="510" y="458" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Phase 7 — Verify + sign-off</text>
</g>
</svg>
