<svg width="680" viewBox="0 0 680 584" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>PoC tunnel and BGP bring-up sequence</title>
<desc>Sequence of bring-up between the on-prem strongSwan/FRR host and the cloud VPN gateway/router: IKEv2 negotiation and CHILD_SA establishing the ESP tunnel, then eBGP TCP connect, OPEN, Established and route exchange, then ICMP data-plane verification.</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="90" y="20" width="180" height="40" rx="9" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
<text x="180" y="40" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#712B13">On-prem (strongSwan / FRR)</text>
<rect x="410" y="20" width="180" height="40" rx="9" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
<text x="500" y="40" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#0C447C">Cloud (VPN gw / Router)</text>

<line x1="180" y1="60" x2="180" y2="566" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 4"/>
<line x1="500" y1="60" x2="500" y2="566" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 4"/>

<text x="340" y="82" text-anchor="middle" font-size="12" font-weight="500" fill="#5F5E5A">Phase 1 · IPsec (IKEv2 / ESP)</text>

<g font-size="11" fill="#5F5E5A" text-anchor="middle">
<text x="340" y="102">IKE_SA_INIT — proposals, DH, nonce</text></g>
<line x1="182" y1="108" x2="498" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="130">IKE_SA_INIT response</text></g>
<line x1="498" y1="136" x2="182" y2="136" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="158">IKE_AUTH — PSK identities</text></g>
<line x1="182" y1="164" x2="498" y2="164" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="186">IKE SA established</text></g>
<line x1="498" y1="192" x2="182" y2="192" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="214">CHILD_SA — ESP over UDP 4500</text></g>
<line x1="182" y1="220" x2="498" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="242">tunnel INSTALLED</text></g>
<line x1="498" y1="248" x2="182" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="208" y="266" width="264" height="18" rx="9" fill="#F1EFE8"/>
<text x="340" y="276" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">ipsec0 up · 169.254.0.0/30 reachable</text>

<text x="340" y="302" text-anchor="middle" font-size="12" font-weight="500" fill="#5F5E5A">Phase 2 · eBGP over the tunnel</text>

<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="320">BGP TCP SYN :179  (.2 → .1)</text></g>
<line x1="182" y1="326" x2="498" y2="326" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="348">SYN-ACK · OPEN (ASN 65020)</text></g>
<line x1="498" y1="354" x2="182" y2="354" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="376">OPEN (ASN 65000) · KEEPALIVE</text></g>
<line x1="182" y1="382" x2="498" y2="382" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="404">BGP Established</text></g>
<line x1="498" y1="410" x2="182" y2="410" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="432">UPDATE — advertise 192.168.1.0/24</text></g>
<line x1="182" y1="438" x2="498" y2="438" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="460">UPDATE — advertise 10.48.0.0/24</text></g>
<line x1="498" y1="466" x2="182" y2="466" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<text x="340" y="494" text-anchor="middle" font-size="12" font-weight="500" fill="#5F5E5A">Phase 3 · Data plane</text>

<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="514">ICMP echo → 10.48.0.x  (over ESP)</text></g>
<line x1="182" y1="520" x2="498" y2="520" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g font-size="11" fill="#5F5E5A" text-anchor="middle"><text x="340" y="542">ICMP reply — data plane verified</text></g>
<line x1="498" y1="548" x2="182" y2="548" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
