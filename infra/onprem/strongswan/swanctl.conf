# strongSwan swanctl config for the GCP VPN PoC (route-based, IKEv2, PSK).
# Replace the <PLACEHOLDERS> with `terraform output` values + your own IP/secret.
# Install to /etc/swanctl/swanctl.conf then: sudo swanctl --load-all

connections {
    gcp {
        version      = 2
        local_addrs  = %any
        remote_addrs = <GCP_VPN_GATEWAY_IP>   # terraform output vpn_gateway_ip

        local {
            auth = psk
            id   = <ONPREM_PUBLIC_IP>          # your WAN/NAT public IP
        }
        remote {
            auth = psk
            id   = <GCP_VPN_GATEWAY_IP>
        }

        # Route-based: full traffic selectors + XFRM interface (if_id 42).
        children {
            gcp {
                local_ts      = 0.0.0.0/0
                remote_ts     = 0.0.0.0/0
                if_id_in      = 42
                if_id_out     = 42
                start_action  = start
                dpd_action    = restart
                esp_proposals = aes256-sha256-modp2048   # PFS group 14
            }
        }

        proposals  = aes256-sha256-modp2048              # IKE: aes256/sha256/DH14
        dpd_delay  = 30s
        mobike     = no
    }
}

secrets {
    ike-gcp {
        id     = <GCP_VPN_GATEWAY_IP>
        secret = "<SHARED_SECRET>"                       # must match shared_secret in tfvars
    }
}
