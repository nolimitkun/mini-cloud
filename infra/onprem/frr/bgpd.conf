! FRR bgpd config for the GCP VPN PoC (on-prem ASN 65000 <-> Cloud Router 65020).
! Install to /etc/frr/bgpd.conf, set bgpd=yes in /etc/frr/daemons, then restart frr.
! Adjust the LAN network to your real range.
!
frr defaults traditional
!
router bgp 65000
 bgp router-id 169.254.0.2
 no bgp ebgp-requires-policy
 neighbor 169.254.0.1 remote-as 65020
 neighbor 169.254.0.1 ebgp-multihop 2
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 172.16.0.0/24
  neighbor 169.254.0.1 activate
  neighbor 169.254.0.1 soft-reconfiguration inbound
 exit-address-family
!
! Two planes advertised to GCP: 192.168.1.0/24 (on-prem private LAN) and
! 172.16.0.0/24 (on-prem cross-cloud range, doc 02 §1.2).
! Learned routes (10.48.0.0/24 private + 172.19.16.0/24 cross-cloud) are installed
! into the kernel by zebra, pointing out ipsec0 — that carries data-plane traffic to GCP.
